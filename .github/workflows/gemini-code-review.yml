name: Gemini Code Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  issue_comment:
    types:
      - created

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    if: >
      (github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '@gemini-cli /review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Resolve pull request context
        id: pr_context
        uses: actions/github-script@v8
        with:
          script: |
            let pr;

            if (context.eventName === 'pull_request') {
              pr = context.payload.pull_request;
            } else {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number
              });
              pr = response.data;
            }

            const isFork = Boolean(pr.head?.repo?.fork);
            const isDraft = Boolean(pr.draft);
            const shouldReview = !isFork && !isDraft;

            core.setOutput('number', String(pr.number));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('title', pr.title || '');
            core.setOutput('body', pr.body || '');
            core.setOutput('is_fork', String(isFork));
            core.setOutput('is_draft', String(isDraft));
            core.setOutput('should_review', String(shouldReview));

      - name: Skip unsupported pull request source
        if: ${{ steps.pr_context.outputs.should_review != 'true' }}
        run: |
          echo "Skipping Gemini review for draft or fork pull request."

      - name: Mint identity token
        id: mint_identity_token
        if: ${{ steps.pr_context.outputs.should_review == 'true' && vars.APP_ID && secrets.APP_PRIVATE_KEY }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Extract review context
        id: review_context
        if: ${{ steps.pr_context.outputs.should_review == 'true' }}
        uses: actions/github-script@v8
        env:
          REQUEST_BODY: ${{ github.event.comment.body || '' }}
        with:
          script: |
            const request = process.env.REQUEST_BODY || '';
            const additionalContext = request.startsWith('@gemini-cli /review')
              ? request.replace(/^@gemini-cli \/review/, '').trim()
              : '';

            core.setOutput('additional_context', additionalContext);

      - name: Checkout pull request head
        if: ${{ steps.pr_context.outputs.should_review == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.pr_context.outputs.head_sha }}

      - name: Prepare Gemini directories
        if: ${{ steps.pr_context.outputs.should_review == 'true' }}
        run: |
          mkdir -p "$HOME/.gemini"
          mkdir -p .gemini

      - name: Install pinned code review extension
        if: ${{ steps.pr_context.outputs.should_review == 'true' }}
        env:
          GOOGLE_GENAI_USE_GCA: "true"
          GEMINI_CLI_VERSION: ${{ vars.GEMINI_CLI_VERSION || '0.35.3' }}
        run: |
          npm install -g "@google/gemini-cli@${GEMINI_CLI_VERSION}"
          gemini extensions install https://github.com/gemini-cli-extensions/code-review --ref dd1a10d2c9d07b2ebade866590fdfa59cd8f9d04 --consent --skip-settings

      - name: Run Gemini pull request review
        id: gemini_pr_review
        if: ${{ steps.pr_context.outputs.should_review == 'true' }}
        uses: google-github-actions/run-gemini-cli@9dbec29a20fab3f35017a40ad0eb798a257d4d51
        env:
          GITHUB_TOKEN: ${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}
          GOOGLE_GENAI_USE_GCA: "true"
          ISSUE_TITLE: ${{ steps.pr_context.outputs.title }}
          ISSUE_BODY: ${{ steps.pr_context.outputs.body }}
          PULL_REQUEST_NUMBER: ${{ steps.pr_context.outputs.number }}
          REPOSITORY: ${{ github.repository }}
          ADDITIONAL_CONTEXT: ${{ steps.review_context.outputs.additional_context }}
        with:
          use_gemini_code_assist: true
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION || '0.35.3' }}
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          upload_artifacts: ${{ vars.UPLOAD_ARTIFACTS }}
          workflow_name: gemini-code-review
          settings: |
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: /pr-code-review
