name: Gemini Code Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  issue_comment:
    types:
      - created

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    if: >
      (github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '@gemini-cli /review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Mint identity token
        id: mint_identity_token
        if: ${{ vars.APP_ID }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Extract review context
        id: review_context
        uses: actions/github-script@v8
        env:
          REQUEST_BODY: ${{ github.event.comment.body || '' }}
        with:
          script: |
            const request = process.env.REQUEST_BODY || '';
            const additionalContext = request.startsWith('@gemini-cli /review')
              ? request.replace(/^@gemini-cli \/review/, '').trim()
              : '';

            core.setOutput('additional_context', additionalContext);

      - name: Checkout pull request head
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.event.pull_request.head.sha }}

      - name: Prepare Gemini directories
        run: |
          mkdir -p "$HOME/.gemini"
          mkdir -p .gemini

      - name: Run Gemini pull request review
        id: gemini_pr_review
        uses: google-github-actions/run-gemini-cli@main
        env:
          GITHUB_TOKEN: ${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}
          GOOGLE_GENAI_USE_GCA: "true"
          ISSUE_TITLE: ${{ github.event.pull_request.title || github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.pull_request.body || github.event.issue.body }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          ADDITIONAL_CONTEXT: ${{ steps.review_context.outputs.additional_context }}
        with:
          use_gemini_code_assist: true
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION }}
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          upload_artifacts: ${{ vars.UPLOAD_ARTIFACTS }}
          workflow_name: gemini-code-review
          settings: |
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: /pr-code-review
