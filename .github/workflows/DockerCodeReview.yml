name: Docker Code Review

on:
  pull_request:
    branches:
      - main

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Run Docker Code Review
      run: |
        docker-compose -f docker-compose.review.yml up --build
        docker-compose -f docker-compose.review.yml down
